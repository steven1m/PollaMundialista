services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: polla_mundialista
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/polla_mundialista
      ADMIN_PASSWORD: aragon2026
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      - db

volumes:
  pgdata:
