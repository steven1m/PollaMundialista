# Render Blueprint — Polla Mundialista Aragón Aluminio
# https://render.com/docs/blueprint-spec

databases:
  - name: polla-db
    plan: free
    databaseName: polla_mundialista
    user: polla

services:
  # ── API (Node + Express + WebSocket) ─────────────────────────────
  - type: web
    name: polla-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    preDeployCommand: npm run db:init
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: polla-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        sync: false

  # ── Frontend (React SPA estática) ────────────────────────────────
  - type: web
    name: polla-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        sync: false
      - key: VITE_WS_URL
        sync: false
